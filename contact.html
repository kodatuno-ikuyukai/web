<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>お問い合わせ | 小立野小学校育友会</title>
    <meta name="description" content="小立野小学校育友会へのお問い合わせページです。">
    <link rel="stylesheet" href="styles.css">
    <script src="assets/js/site.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="site-title" href="index.html">小立野小学校育友会</a>
        <button class="menu-toggle" type="button" aria-controls="site-nav" aria-expanded="false">
          <span class="visually-hidden">メニューを開く</span>
          <span class="menu-toggle-line" aria-hidden="true"></span>
          <span class="menu-toggle-line" aria-hidden="true"></span>
          <span class="menu-toggle-line" aria-hidden="true"></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="主要ナビゲーション">
          <a href="index.html">ホーム</a>
          <a href="about.html">小立野小学校育友会について</a>
          <a href="mamorun.html">まもるん絵描き歌</a>
          <a href="assembly.html">資料一覧</a>
          <a href="contact.html" aria-current="page">お問い合わせ</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-heading page-heading-photo contact-heading">
        <div class="container">
          <p class="eyebrow">Contact</p>
          <h1>お問い合わせ</h1>
          <p class="lead">
            小立野小学校育友会へのご質問やご連絡は、こちらのフォームからお送りください。
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container contact-layout">
          <div class="form-panel">
            <div class="form-embed">
              <p class="eyebrow">Google Form</p>
              <h2>お問い合わせフォーム</h2>
              <p>
                必要事項をご入力のうえ、フォームから送信してください。
                表示されない場合は、下のボタンからGoogleフォームを開けます。
              </p>
              <a
                class="button secondary form-link"
                href="https://docs.google.com/forms/d/e/1FAIpQLSfUGE6pXCtOl37GEclDimiBc4gyJhnJbihKFut3h_YdUxdrbw/viewform"
                target="_blank"
                rel="noopener"
              >
                フォームを別タブで開く
              </a>
              <iframe
                class="google-form-frame"
                src="https://docs.google.com/forms/d/e/1FAIpQLSfUGE6pXCtOl37GEclDimiBc4gyJhnJbihKFut3h_YdUxdrbw/viewform?embedded=true"
                title="小立野小学校育友会 お問い合わせフォーム"
                loading="lazy"
              >読み込んでいます...</iframe>
              <p class="form-note">
                送信内容を確認後、担当者より必要に応じてご連絡します。
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>&copy; 小立野小学校育友会</small>
      </div>
    </footer>
  </body>
</html>
